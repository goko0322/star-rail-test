<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>崩壞:星穹鐵道</title>
  <style>
      html, body {
      margin: 0;
      padding: 0;
      height: 100%;
    }
    body {
      background-image: url('https://upload-os-bbs.hoyolab.com/upload/2025/03/28/4a94648935235d0c4218bc8c83690b97_2098915931870472620.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      position: relative;
    }

    .button-container {
      position: absolute;
      bottom: 5%;
      right: 47.5%;
    }

    .cone-button-container {
      position: absolute;
      bottom: 5%;
      right: 90%;
    }

    .bg-button-container {
      position: absolute;
      bottom: 5%;
      right: 2%;
    }

    .btn {
      background-color: rgba(224, 225, 225, 0.6);
      color: #696969;
      border: none;
      padding: 12px 24px;
      font-size: 30px;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.3s;
      font-weight: bold;
    }

    .btn:hover {
      background-color: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>
  <div class="button-container">
    <a href="role.html"><button class="btn">角色</button></a>
  </div>

  <div class="bg-button-container">
    <button class="btn" onclick="changeBackground()">換背景</button>
  </div>

  <div class="cone-button-container">
  <a href="lightcone.html"><button class="btn">光錐</button></a>
</div>

  <script>
    const backgrounds = [
      "https://scontent-tpe1-1.xx.fbcdn.net/v/t39.30808-6/677752223_975552448320279_6669021438885522400_n.png?_nc_cat=111&ccb=1-7&_nc_sid=2a1932&_nc_ohc=-N8tXmguYmIQ7kNvwE_2BGM&_nc_oc=Adpx6l6hsQeitMcBIakmhBJ5KdR8He7Cky0OvhMD19SDgoovbJEwrJHhew-vyx-UhzJpjwRTi6prmDBGNWq5FQzi&_nc_zt=23&_nc_ht=scontent-tpe1-1.xx&_nc_gid=BUBz-KkJgsHak02f04pjKA&_nc_ss=7b2a8&oh=00_Af6Un-plVGr7tJBkSvBJUbHuzQRbfsDnvYVAKfUCkMFBaw&oe=6A0361CA",
      "https://upload-os-bbs.hoyolab.com/upload/2025/03/28/4a94648935235d0c4218bc8c83690b97_2098915931870472620.jpg",
      "明天見.jpeg",
      "https://act-upload.mihoyo.com/sr-wiki/2025/04/14/193706962/261d84240a58b4d4b237092a90eadac0_3500610950730301391.jpg",
      "https://act-upload.mihoyo.com/sr-wiki/2025/04/14/193706962/60051bb08762358c3ff096a236663efe_4253837992751046340.png"
     
    ];
    let current = 0;

    function changeBackground() {
      current = (current + 1) % backgrounds.length;
      document.body.style.backgroundImage = `url('${backgrounds[current]}')`;
    }
  </script>
</body>
</html>
